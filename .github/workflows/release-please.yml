name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

      # Merge the release PR, then re-trigger this workflow so release-please
      # can detect the merged PR, create the tag, and set release_created=true.
      # (GITHUB_TOKEN merges don't auto-trigger push workflows — we re-trigger manually.)
      - name: Auto-merge release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.number')
          gh pr merge --merge --delete-branch --repo "${{ github.repository }}" "$PR_NUMBER"
          gh workflow run release-please.yml --repo "${{ github.repository }}"

      # Runs on the re-triggered workflow_dispatch after the PR is merged.
      # release-please creates the tag; we create the GitHub Release here.
      - name: Create GitHub Release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.release.outputs.version }}
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --notes "## Install

          \`\`\`bash
          pip install maskops==${VERSION}
          \`\`\`

          See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/docs/CHANGELOG.md) for details."
