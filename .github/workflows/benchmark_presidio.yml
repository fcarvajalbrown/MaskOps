name: Presidio Benchmark

on:
  workflow_dispatch:  # manual trigger only

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: rust-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Set up venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install maturin polars faker pytest
          pip install presidio-analyzer presidio-anonymizer spacy
          python -m spacy download en_core_web_lg

      - name: Build maskops
        run: |
          source .venv/bin/activate
          maturin develop --release
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv

      - name: Run Presidio benchmark
        run: |
          source .venv/bin/activate
          python benchmarks/benchmark_presidio.py
        env:
          VIRTUAL_ENV: ${{ github.workspace }}/.venv

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: presidio-benchmark-results
          path: benchmarks/
          retention-days: 90