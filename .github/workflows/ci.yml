name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          # TODO: Rust extension fails to load on ubuntu-latest + 3.12 (dlopen).
          - os: ubuntu-latest
            python-version: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install dependencies and build (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m venv .venv
          .venv/bin/pip install maturin faker polars pytest pytest-cov
          .venv/bin/maturin develop --release
          .venv/bin/python tests/generate_fixtures.py
          .venv/bin/pytest tests/ -v --cov=maskops --cov-report=xml:coverage/coverage.xml

      - name: Install dependencies and build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          python -m venv .venv
          .venv\Scripts\activate.bat
          pip install maturin faker polars pytest pytest-cov
          maturin develop --release
          python tests/generate_fixtures.py
          pytest tests/ -v --cov=maskops --cov-report=xml:coverage\coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage.xml
          fail_ci_if_error: false

  typecheck:
    name: Type check (mypy + pyright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install type-check dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install polars mypy pyright

      - name: mypy (strict)
        run: .venv/bin/python -m mypy

      - name: pyright (standard)
        run: .venv/bin/python -m pyright