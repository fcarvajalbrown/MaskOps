name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Stores signatures in a dedicated branch of this repo.
          # No external service required.
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/fcarvajalbrown/MaskOps/blob/main/CLA.md
          branch: cla-signatures
          # Comment the bot posts on the PR
          signed-label: cla-signed
          unsigned-label: cla-pending
          sign-comment: >
            I have read the CLA and agree to its terms.
          # Bots, dependabot, and the repo owner are exempt
          allowlist: bot,fcarvajalbrown,dependabot[bot],dependabot
