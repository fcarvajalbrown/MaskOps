<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Icon background -->
  <rect x="5" y="5" width="190" height="190" rx="38" fill="#0F2318"/>

  <defs>
    <clipPath id="left-half">
      <rect x="0" y="0" width="100" height="200"/>
    </clipPath>
  </defs>

  <!-- Left half: solid white mask -->
  <g clip-path="url(#left-half)">
    <path
      d="M100 65 C122 61 148 63 162 72 C172 78 178 88 175 98
         C171 111 158 118 142 120 C130 123 116 127 100 127
         C84 127 70 123 58 120 C42 118 29 111 25 98
         C22 88 28 78 38 72 C52 63 78 61 100 65 Z"
      fill="#FFFFFF"/>
    <!-- Left eye hole -->
    <ellipse cx="68" cy="95" rx="21" ry="13" fill="#0F2318"/>
  </g>

  <!-- Right half: green pixel grid (dissolving mask) -->
  <!-- Row 1 (y=64) -->
  <rect x="101" y="64" width="9" height="9" fill="#3DDB81"/>
  <rect x="112" y="64" width="9" height="9" fill="#3DDB81"/>
  <rect x="123" y="64" width="9" height="9" fill="#3DDB81"/>
  <rect x="134" y="64" width="9" height="9" fill="#3DDB81"/>
  <rect x="145" y="64" width="9" height="9" fill="#3DDB81"/>
  <!-- Row 2 (y=75) -->
  <rect x="101" y="75" width="9" height="9" fill="#3DDB81"/>
  <rect x="112" y="75" width="9" height="9" fill="#3DDB81"/>
  <rect x="123" y="75" width="9" height="9" fill="#3DDB81"/>
  <rect x="134" y="75" width="9" height="9" fill="#3DDB81"/>
  <rect x="145" y="75" width="9" height="9" fill="#3DDB81"/>
  <rect x="156" y="75" width="9" height="9" fill="#3DDB81"/>
  <!-- Row 3 (y=86) — eye hole at ~x=108-152, skip those -->
  <rect x="101" y="86" width="9" height="9" fill="#3DDB81"/>
  <!-- gap: right eye hole spans x≈108-152, so skip x=112,123,134,145 -->
  <rect x="156" y="86" width="9" height="9" fill="#3DDB81"/>
  <rect x="167" y="86" width="9" height="9" fill="#3DDB81"/>
  <!-- Row 4 (y=97) — eye hole center row -->
  <rect x="101" y="97" width="9" height="9" fill="#3DDB81"/>
  <!-- eye hole gap -->
  <rect x="156" y="97" width="9" height="9" fill="#3DDB81"/>
  <rect x="167" y="97" width="9" height="9" fill="#3DDB81"/>
  <!-- Row 5 (y=108) -->
  <rect x="101" y="108" width="9" height="9" fill="#3DDB81"/>
  <rect x="112" y="108" width="9" height="9" fill="#3DDB81"/>
  <rect x="123" y="108" width="9" height="9" fill="#3DDB81"/>
  <rect x="134" y="108" width="9" height="9" fill="#3DDB81"/>
  <rect x="145" y="108" width="9" height="9" fill="#3DDB81"/>
  <rect x="156" y="108" width="9" height="9" fill="#3DDB81"/>
  <!-- Row 6 (y=119) -->
  <rect x="101" y="119" width="9" height="9" fill="#3DDB81"/>
  <rect x="112" y="119" width="9" height="9" fill="#3DDB81"/>
  <rect x="123" y="119" width="9" height="9" fill="#3DDB81"/>
  <rect x="134" y="119" width="9" height="9" fill="#3DDB81"/>
  <rect x="145" y="119" width="9" height="9" fill="#3DDB81"/>
  <!-- Row 7 (y=130) — bottom taper -->
  <rect x="101" y="130" width="9" height="9" fill="#3DDB81"/>
  <rect x="112" y="130" width="9" height="9" fill="#3DDB81"/>
  <rect x="123" y="130" width="9" height="9" fill="#3DDB81"/>
</svg>
